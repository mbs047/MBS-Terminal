name: Bug report
description: Report something that is broken or behaving unexpectedly.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please remove any private paths, tokens, or profile contents before submitting.
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: Example: Windows 11 23H2
      value: Windows 11 23H2
    validations:
      required: true
  - type: input
    id: terminal-version
    attributes:
      label: Windows Terminal version
      description: Open Windows Terminal settings or About to check this. Use "Not sure" if you cannot find it.
      value: Windows Terminal 1.20.0
  - type: input
    id: powershell-version
    attributes:
      label: PowerShell version
      description: Run `$PSVersionTable.PSVersion` in PowerShell if possible.
      value: Windows PowerShell 5.1.22621.2506
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that triggers the problem.
      value: |
        1. Run .\install.ps1 ...
        2. Open Windows Terminal profile ...
        3. Trigger the issue by ...
        4. The error appears when ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      value: |
        I expected MBS Terminal to...

        Mention the prompt, profile, icon, command, installer option, or restore behavior you wanted to see.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      value: |
        Instead, MBS Terminal...

        Mention exact error text, missing files, broken prompt segments, visual differences, or commands that failed.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Output or screenshots
      description: Paste safe command output or attach screenshots. Do not include secrets or private profile contents.
      value: |
        # Command
        .\install.ps1 -InstallDependencies

        # Safe output or screenshot notes
        Error: ...
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      description: Confirm these before opening the bug report.
      options:
        - label: I removed private paths, tokens, or sensitive profile contents.
          required: true
        - label: I checked the README and existing issues first.
          required: true
