name: Feature request
description: Suggest an improvement or new capability.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or pain point should this improve?
      placeholder: |
        I want MBS Terminal to...
        Today I have to...
        This matters because...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you would like.
      placeholder: |
        Add support for...
        It should work when...
        Mention any command, installer option, prompt segment, config file, or UI behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: |
        I tried...
        A workaround is...
        This is not enough because...
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Choose the closest part of MBS Terminal affected by this idea.
      options:
        - Installer
        - Windows Terminal settings
        - PowerShell helpers
        - Starship config
        - Documentation
        - Other
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      description: Confirm this before opening the feature request.
      options:
        - label: I checked existing issues and pull requests first.
          required: true
