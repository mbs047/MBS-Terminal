name: Configuration help
description: Get help with installation, terminal configuration, or prompt setup.
title: "[Help]: "
labels:
  - support
body:
  - type: markdown
    attributes:
      value: |
        Share enough context to reproduce the setup issue, but do not paste secrets, tokens, or full profile files.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Choose the part of setup where you need help.
      options:
        - Installer
        - Windows Terminal settings
        - PowerShell profile
        - Starship prompt
        - Icons or screenshots
        - Other
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      description: Include the edition/build if you know it. Use "Not sure" if needed.
      placeholder: Windows 11 23H2 or Not sure
    validations:
      required: true
  - type: input
    id: command
    attributes:
      label: Command you ran
      description: Include the exact command, installer option, or terminal action.
      placeholder: .\install.ps1 -InstallDependencies
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What do you need help with?
      placeholder: |
        What you are trying to set up:
        What happened:
        What you expected:
        What you already tried:
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output or screenshot
      description: Paste safe command output or attach screenshots.
      placeholder: |
        Paste the command and safe output here.
        Include the exact error line or attach a screenshot if this is visual.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      description: Confirm these before opening the help request.
      options:
        - label: I removed private paths, tokens, or sensitive profile contents.
          required: true
        - label: I checked the README first.
          required: true
