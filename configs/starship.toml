"$schema" = "https://starship.rs/config-schema.json"

add_newline = true
command_timeout = 1000
format = """
[mbs](bold fg:#C099FF) $username$directory$git_branch$git_status$custom$php$nodejs$python$package$cmd_duration
$character"""
right_format = "$time"
scan_timeout = 30

[character]
error_symbol = "[x](bold fg:#F7768E)"
success_symbol = "[>](bold fg:#9ECE6A)"
vimcmd_symbol = "[<](bold fg:#7AA2F7)"

[cmd_duration]
format = "[time $duration](fg:#53627A) "
min_time = 500
show_milliseconds = true

[custom.laravel]
command = "echo laravel"
detect_files = ["artisan"]
format = "[laravel $output]($style) "
style = "fg:#F7768E"

[directory]
format = "[dir $path]($style)[$read_only]($read_only_style) "
home_symbol = "~"
read_only = " ro"
read_only_style = "fg:#E0AF68"
style = "bold fg:#7DCFFF"
truncate_to_repo = false
truncation_length = 4

[git_branch]
format = "[git $branch]($style) "
style = "bold fg:#E0AF68"

[git_status]
ahead = "+${count}"
behind = "-${count}"
conflicted = "x"
deleted = "del"
diverged = "+${ahead_count}/-${behind_count}"
format = "([$all_status$ahead_behind]($style) )"
modified = "mod"
renamed = "ren"
staged = "ok"
stashed = "stash"
style = "fg:#F7768E"
untracked = "?"

[nodejs]
format = "[node]($style) "
style = "fg:#9ECE6A"

[package]
format = "[pkg $version]($style) "
style = "fg:#C099FF"

[php]
format = "[php]($style) "
style = "fg:#7AA2F7"

[python]
format = "[py]($style) "
style = "fg:#9ECE6A"

[time]
disabled = false
format = "[clock $time]($style)"
style = "fg:#53627A"
time_format = "%H:%M"

[username]
format = "[__MBS_DISPLAY_NAME__]($style) "
show_always = true
style_user = "bold fg:#D6DEEB"
